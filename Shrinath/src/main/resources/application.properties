spring.application.name=Shrinath

# Server Config
server.port=${PORT:8080}

# Database Connection - TiDB Cloud
# Set DB_PASSWORD or SPRING_DATASOURCE_PASSWORD in your deployment environment. Do not commit real database passwords.
# Service URI: mysql://2wZiAdp9Ck6nwH8.root:<DB_PASSWORD>@gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/sys?sslMode=VERIFY_IDENTITY
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:mysql://gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/sys?sslMode=VERIFY_IDENTITY&enabledTLSProtocols=TLSv1.2}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:2wZiAdp9Ck6nwH8.root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:u7U6WQiJumiX6ogW}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# TiDB deployment details
app.database.name=${DB_NAME:sys}
app.database.host=${DB_HOST:gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com}
app.database.replica-host=${DB_REPLICA_HOST:gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com}
app.database.port=${DB_PORT:4000}
app.database.ssl-mode=${DB_SSL_MODE:VERIFY_IDENTITY}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.admin.phone-number=${ADMIN_PHONE_NUMBER:}
app.admin.password=${ADMIN_PASSWORD:}

# ─── JWT ─────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:change_this_local_dev_secret_to_a_64_plus_character_random_value_before_live_use}
# Access token: 24 hours
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# Refresh token: 7 days
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}

# ─── Email / JavaMail (Brevo SMTP Relay) ────────────────────────
# Render free tier BLOCKS outbound port 465 (Gmail SSL) and 587 (Gmail STARTTLS).
# Brevo (formerly Sendinblue) SMTP relay on port 587 works fine on Render.
# Free plan: 300 emails/day — sufficient for OTPs and order emails.
# Setup: https://app.brevo.com → Account → SMTP & API → copy Login + Password
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
# MAIL_PASSWORD = the SMTP key from Brevo dashboard (NOT your Brevo login password)
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
# Set to false in production once everything is confirmed working
spring.mail.properties.mail.debug=false
app.admin.email=${ADMIN_EMAIL:}
# Display name shown in "From" field
app.mail.from-name=Shrinath Cycle Store

# ─── Brevo HTTP API (for OTP emails — bypasses SMTP which Render blocks) ───────
# Get your API key: Brevo dashboard → Account → SMTP & API → API Keys tab → Generate
# This is different from the SMTP key!
brevo.api.key=${BREVO_API_KEY:}
# Must match a verified sender in Brevo: Settings → Senders, domains, IPs → Add a sender
brevo.sender.email=${BREVO_SENDER_EMAIL:gutkarsh702@gmail.com}

# ─── Payment Gateway ─────────────────────────────────────────────
payment.gateway=${PAYMENT_GATEWAY:RAZORPAY}
payment.gateway.key-id=${PAYMENT_GATEWAY_KEY_ID:}
payment.gateway.secret=${PAYMENT_GATEWAY_SECRET:change_this_payment_secret_before_live_use}

# ─── Twilio (SMS/WhatsApp fallback) ──────────────────────────────
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}
# WhatsApp sandbox: whatsapp:+14155238886 (Twilio trial)
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:}

# ─── Fast2SMS (Free Indian SMS — primary provider) ────────────────
# Sign up free at https://www.fast2sms.com → Dashboard → Dev API Key
# Paste your key below or set env var FAST2SMS_API_KEY
fast2sms.api-key=${FAST2SMS_API_KEY:}
fast2sms.base-url=https://www.fast2sms.com/dev/bulkV2

# ─── Green API (FREE WhatsApp via YOUR number — 500 msg/month) ───────────
# Uses your own WhatsApp (7052050415) as sender. No third-party number needed.
# Setup (5 minutes):
#   1. Go to https://green-api.com → Register free → Create Instance (Developer plan)
#   2. On the instance page, click "Scan QR" → scan with WhatsApp on 7052050415
#   3. Status becomes "Authorized" → copy Instance ID and API Token Key below
greenapi.instance-id=${GREENAPI_INSTANCE_ID:}
greenapi.api-token=${GREENAPI_API_TOKEN:}
# Phone to receive alerts (country code + number, no + or spaces)
greenapi.admin-phone=${GREENAPI_ADMIN_PHONE:}

# ─── Telegram Bot (FREE admin alerts — RECOMMENDED) ─────────────────────
# Best alternative to WhatsApp. Free forever, no restrictions.
# Setup (2 minutes):
#   1. Open Telegram → search @BotFather → send /newbot → follow steps → copy TOKEN
#   2. Search your new bot in Telegram → send it any message (e.g. "hello")
#   3. Open in browser: https://api.telegram.org/bot<TOKEN>/getUpdates
#      Find "chat":{"id": 123456789}  ← that is your CHAT ID
#   4. Paste both values below:
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.admin-chat-id=${TELEGRAM_ADMIN_CHAT_ID:}

# ─── CallMeBot (Free WhatsApp — admin new-order alerts) ───────────────────
# NOTE: CallMeBot number (+34 644 59 79 98) may not always be on WhatsApp.
# If it works for you, complete opt-in and paste key below.
# One-time opt-in: WhatsApp "I allow callmebot to send me messages" to +34 644 59 79 98
whatsapp.callmebot.api-key=${CALLMEBOT_API_KEY:}
# Admin WhatsApp-registered phone (country code + number, no + or spaces)
whatsapp.callmebot.admin-phone=${CALLMEBOT_ADMIN_PHONE:}

# ─── Rate Limiting (auth endpoints) ──────────────────────────────
app.rate-limit.max-attempts=${RATE_LIMIT_MAX:5}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW:60}

# ─── Cart Abandonment Scheduler Configurations ─────────────────────────────
app.cart.abandonment-threshold-minutes=${CART_ABANDON_THRESHOLD:30}
app.cart.scheduler-fixed-rate-ms=${CART_SCHEDULER_RATE:60000}
