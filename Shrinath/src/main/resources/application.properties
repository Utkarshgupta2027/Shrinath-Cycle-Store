spring.application.name=Shrinath

# Server Config
server.port=8080

# Database Connection

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/shreenath_store?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.admin.phone-number=${ADMIN_PHONE_NUMBER:7052050415}
app.jwt.secret=${JWT_SECRET:change_this_local_dev_secret_to_a_64_plus_character_random_value_before_live_use}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}

# ─── Email / JavaMail ────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
# Use a Gmail App Password (not your regular Gmail password).
# Generate one at: https://myaccount.google.com/apppasswords
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.admin.email=${ADMIN_EMAIL:}

payment.gateway=${PAYMENT_GATEWAY:RAZORPAY}
payment.gateway.key-id=${PAYMENT_GATEWAY_KEY_ID:}
payment.gateway.secret=${PAYMENT_GATEWAY_SECRET:change_this_payment_secret_before_live_use}
