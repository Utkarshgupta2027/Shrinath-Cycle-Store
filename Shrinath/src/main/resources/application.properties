# ─── JWT ─────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:change_this_local_dev_secret_to_a_64_plus_character_random_value_before_live_use}
# Access token: 24 hours
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# Refresh token: 7 days
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}

